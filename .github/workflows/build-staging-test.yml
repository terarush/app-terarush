name: Staging Build Test

on:
  push:
    branches:
      - staging
  pull_request:
    branches:
      - staging

jobs:
  go-build:
    name: Go Build Test (Backend & Events)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Backend (Go 1.25)
      - name: Set up Go (Backend)
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build Backend Go binary
        run: |
          go mod download
          go build -v -o bin/app main.go

      # Events (Go 1.24)
      - name: Set up Go (Events)
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: events/go.sum

      - name: Build Events Go binary
        working-directory: events
        run: |
          go mod download
          go build -v -o bin/events-service .

  node-build:
    name: Node Build Test (Web)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Run linter
        working-directory: web
        run: npm run lint

      - name: Build web application
        working-directory: web
        run: npm run build

  docker-build:
    name: Docker Build Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: .
            file: Dockerfile
          - name: events
            context: events
            file: events/Dockerfile
          - name: web
            context: web
            file: web/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (dry-run)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          cache-from: type=gha,scope=staging-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=staging-${{ matrix.name }}
