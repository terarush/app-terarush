name: Deploy Web to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - '.github/workflows/deploy-web.yaml'
  pull_request:
    types: [closed]
    branches:
      - main
    paths:
      - 'web/**'
      - '.github/workflows/deploy-web.yaml'

jobs:
  Deploy-Production:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ./web

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: 'npm'
          cache-dependency-path: ./web/package-lock.json

      - name: Setup Vercel Project
        run: |
          mkdir -p .vercel
          echo "{\"projectId\":\"${{ vars.VERCEL_PROJECT_ID }}\",\"orgId\":\"${{ vars.VERCEL_ORG_ID }}\"}" > .vercel/project.json

      - name: Install Dependencies
        run: npm ci

      - name: Build with Vite
        run: npm run build
        env:
          VITE_GITHUB_CLIENT_ID: ${{ secrets.VITE_GITHUB_CLIENT_ID }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_NODE_ENV: ${{ secrets.VITE_NODE_ENV }}

      - name: Deploy to Vercel
        run: npx vercel deploy --prebuilt --prod --token=${{ vars.VERCEL_TOKEN }}
