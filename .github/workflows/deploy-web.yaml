name: Deploy Web to Vercel

env:
  VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ vars.VERCEL_TOKEN }}

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - '.github/workflows/deploy-web.yaml'
  pull_request:
    types: [closed]
    branches:
      - main
    paths:
      - 'web/**'
      - '.github/workflows/deploy-web.yaml'

jobs:
  Deploy-Production:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ./web

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: 'npm'
          cache-dependency-path: ./web/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Project Settings
        run: vercel pull --yes --environment=production --token=${{ env.VERCEL_TOKEN }}

      - name: Write Env File for Build
        run: |
          echo "VITE_GITHUB_CLIENT_ID=${{ vars.VITE_GITHUB_CLIENT_ID }}" >> .vercel/.env.production.local
          echo "VITE_API_URL=${{ vars.VITE_API_URL }}" >> .vercel/.env.production.local
          echo "VITE_NODE_ENV=${{ vars.VITE_NODE_ENV }}" >> .vercel/.env.production.local

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ env.VERCEL_TOKEN }}

      - name: Deploy Prebuilt Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ env.VERCEL_TOKEN }}
