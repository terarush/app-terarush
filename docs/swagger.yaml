basePath: /api/v1
definitions:
  entity.Collection:
    properties:
      color:
        description: hex color
        type: string
      created_at:
        type: string
      description:
        type: string
      icon:
        type: string
      id:
        type: integer
      is_public:
        type: boolean
      name:
        type: string
      sort_order:
        type: integer
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  entity.ContentFilter:
    properties:
      action:
        description: flag, block, review, warn
        type: string
      created_at:
        type: string
      created_by:
        type: integer
      hit_count:
        type: integer
      id:
        type: integer
      is_active:
        type: boolean
      pattern:
        type: string
      severity:
        type: string
      type:
        description: keyword, regex, domain, ip
        type: string
      updated_at:
        type: string
    type: object
  entity.Newsletter:
    properties:
      bounce_count:
        type: integer
      click_count:
        type: integer
      content:
        type: string
      created_at:
        type: string
      created_by:
        type: integer
      id:
        type: integer
      open_count:
        type: integer
      scheduled_for:
        type: string
      sent_at:
        type: string
      sent_count:
        type: integer
      status:
        description: draft, queued, sending, sent, failed
        type: string
      summary:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  handler.UploadImageResponse:
    properties:
      path:
        type: string
      url:
        type: string
    type: object
  request.AddCapabilityRequest:
    properties:
      agent_id:
        type: integer
      capability:
        enum:
        - read
        - write
        - execute
        - search
        - analyze
        - code
        - integrate
        - monitor
        - schedule
        - notify
        type: string
      config:
        type: string
    required:
    - agent_id
    - capability
    type: object
  request.AssignTaskRequest:
    properties:
      agent_id:
        type: integer
    required:
    - agent_id
    type: object
  request.ChangePasswordRequest:
    properties:
      confirm_password:
        type: string
      new_password:
        minLength: 8
        type: string
      old_password:
        minLength: 6
        type: string
    required:
    - confirm_password
    - new_password
    - old_password
    type: object
  request.CompleteTaskRequest:
    properties:
      output:
        type: string
      result_summary:
        maxLength: 5000
        type: string
    type: object
  request.CreateAgentRequest:
    properties:
      description:
        maxLength: 2000
        type: string
      max_concurrent:
        maximum: 10
        minimum: 1
        type: integer
      model:
        maxLength: 100
        type: string
      name:
        maxLength: 255
        type: string
      retry_limit:
        maximum: 10
        minimum: 0
        type: integer
      system_prompt:
        maxLength: 10000
        type: string
      timeout:
        maximum: 86400
        minimum: 1
        type: integer
    required:
    - name
    type: object
  request.CreateBlogRequest:
    properties:
      category:
        maxLength: 100
        type: string
      content:
        type: string
      excerpt:
        maxLength: 500
        type: string
      image:
        maxLength: 255
        type: string
      is_published:
        type: boolean
      slug:
        maxLength: 255
        type: string
      tags:
        maxLength: 255
        type: string
      title:
        maxLength: 255
        type: string
    required:
    - content
    - slug
    - title
    type: object
  request.CreateCommentRequest:
    properties:
      content:
        type: string
      post_id:
        type: integer
    required:
    - content
    - post_id
    type: object
  request.CreateFavoriteRequest:
    properties:
      post_id:
        type: integer
      user_id:
        type: integer
    type: object
  request.CreateReplyRequest:
    properties:
      content:
        type: string
      parent_id:
        type: string
      post_id:
        type: integer
    required:
    - content
    - parent_id
    - post_id
    type: object
  request.CreateScheduleRequest:
    properties:
      agent_id:
        type: integer
      cron_expr:
        maxLength: 100
        type: string
      description:
        maxLength: 2000
        type: string
      input_config:
        type: string
      max_runs:
        minimum: 0
        type: integer
      name:
        maxLength: 255
        type: string
      template_id:
        type: integer
      timezone:
        maxLength: 50
        type: string
    required:
    - agent_id
    - cron_expr
    - name
    type: object
  request.CreateTaskFromTemplateRequest:
    properties:
      input:
        type: string
      template_id:
        type: integer
    required:
    - template_id
    type: object
  request.CreateTaskRequest:
    properties:
      category:
        maxLength: 100
        type: string
      deadline:
        description: RFC3339
        type: string
      description:
        maxLength: 10000
        type: string
      input:
        type: string
      max_attempts:
        maximum: 10
        minimum: 1
        type: integer
      parent_task_id:
        type: integer
      priority:
        enum:
        - -1
        - 0
        - 1
        - 2
        type: integer
      tags:
        maxLength: 500
        type: string
      title:
        maxLength: 500
        type: string
    required:
    - title
    type: object
  request.CreateTemplateRequest:
    properties:
      category:
        maxLength: 100
        type: string
      description:
        maxLength: 2000
        type: string
      input_schema:
        type: string
      is_public:
        type: boolean
      max_attempts:
        maximum: 10
        minimum: 1
        type: integer
      name:
        maxLength: 255
        type: string
      priority:
        enum:
        - -1
        - 0
        - 1
        - 2
        type: integer
      prompt:
        type: string
      tags:
        maxLength: 500
        type: string
      variables:
        type: string
    required:
    - name
    - prompt
    type: object
  request.CreateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 8
        type: string
      role:
        enum:
        - admin
        - user
        type: string
    required:
    - email
    - name
    - password
    type: object
  request.FailTaskRequest:
    properties:
      error_message:
        type: string
    required:
    - error_message
    type: object
  request.LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  request.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  request.SetAgentStatusRequest:
    properties:
      status:
        enum:
        - idle
        - busy
        - error
        - disabled
        type: string
    required:
    - status
    type: object
  request.ToggleCapabilityRequest:
    properties:
      enabled:
        type: boolean
    required:
    - enabled
    type: object
  request.UpdateAgentRequest:
    properties:
      description:
        maxLength: 2000
        type: string
      max_concurrent:
        maximum: 10
        minimum: 1
        type: integer
      model:
        maxLength: 100
        type: string
      name:
        maxLength: 255
        type: string
      retry_limit:
        maximum: 10
        minimum: 0
        type: integer
      status:
        enum:
        - idle
        - busy
        - error
        - disabled
        type: string
      system_prompt:
        maxLength: 10000
        type: string
      timeout:
        maximum: 86400
        minimum: 1
        type: integer
    type: object
  request.UpdateBlogRequest:
    properties:
      category:
        maxLength: 100
        type: string
      content:
        type: string
      excerpt:
        maxLength: 500
        type: string
      image:
        maxLength: 255
        type: string
      is_published:
        type: boolean
      slug:
        maxLength: 255
        type: string
      tags:
        maxLength: 255
        type: string
      title:
        maxLength: 255
        type: string
    required:
    - content
    - slug
    - title
    type: object
  request.UpdateCommentRequest:
    properties:
      content:
        type: string
      post_id:
        type: integer
    required:
    - content
    - post_id
    type: object
  request.UpdateTaskRequest:
    properties:
      category:
        maxLength: 100
        type: string
      description:
        maxLength: 10000
        type: string
      input:
        type: string
      max_attempts:
        maximum: 10
        minimum: 1
        type: integer
      priority:
        enum:
        - -1
        - 0
        - 1
        - 2
        type: integer
      progress:
        maximum: 100
        minimum: 0
        type: number
      status:
        enum:
        - pending
        - assigned
        - in_progress
        - completed
        - failed
        - cancelled
        - paused
        type: string
      tags:
        maxLength: 500
        type: string
      title:
        maxLength: 500
        type: string
    type: object
  request.UpdateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
      role:
        enum:
        - admin
        - user
        type: string
    required:
    - email
    - name
    type: object
  response.AssetResponse:
    properties:
      created_at:
        type: string
      file_name:
        type: string
      id:
        type: integer
      mime_type:
        type: string
      path:
        type: string
      updated_at:
        type: string
      url:
        type: string
    type: object
  response.AuthResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      token_type:
        type: string
      user:
        $ref: '#/definitions/response.UserResponse'
    type: object
  response.BlogResponse:
    properties:
      author:
        type: string
      category:
        type: string
      content:
        type: string
      created_at:
        type: string
      excerpt:
        type: string
      id:
        type: integer
      image:
        type: string
      is_published:
        type: boolean
      published_at:
        type: string
      slug:
        type: string
      tags:
        type: string
      title:
        type: string
      updated_at:
        type: string
      view_count:
        type: integer
    type: object
  response.CommentResponse:
    properties:
      content:
        type: string
      created_at:
        type: integer
      id:
        type: string
      parent_id:
        type: string
      post_id:
        type: integer
      replies:
        items:
          $ref: '#/definitions/response.CommentResponse'
        type: array
      updated_at:
        type: integer
      user_avatar:
        type: string
      user_id:
        type: integer
      user_name:
        type: string
    type: object
  response.ListAssetsResponse:
    properties:
      assets:
        items:
          $ref: '#/definitions/response.AssetResponse'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  response.UploadAssetResponse:
    properties:
      id:
        type: integer
      path:
        type: string
      url:
        type: string
    type: object
  response.UserResponse:
    properties:
      avatar:
        type: string
      banner:
        type: string
      bio:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      is_banned:
        type: boolean
      name:
        type: string
      provider:
        type: string
      role:
        type: string
      updated_at:
        type: string
    type: object
  utils.CreatedResponse:
    properties:
      data: {}
      error: {}
      message:
        type: string
    type: object
  utils.ErrorResponse:
    properties:
      data: {}
      error: {}
      message:
        type: string
    type: object
  utils.SuccessResponse:
    properties:
      data: {}
      error: {}
      message:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Modular blogging platform API
  title: TeraRush API
  version: "1.0"
paths:
  /api/v1/activity:
    get:
      description: List all activities with optional type filter
      parameters:
      - description: Filter by activity type
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Activities list
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - Bearer: []
      summary: List activities
      tags:
      - Activity
  /api/v1/activity/feed:
    get:
      description: Get paginated activity feed for current user
      parameters:
      - description: Number of items (default 20)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Feed items
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - Bearer: []
      summary: Get activity feed
      tags:
      - Activity
  /api/v1/activity/feed/{id}/read:
    patch:
      description: Mark a single feed item as read by ID
      parameters:
      - description: Feed item ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Marked read
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - Bearer: []
      summary: Mark feed item read
      tags:
      - Activity
  /api/v1/activity/feed/unread:
    get:
      description: Get the count of unread feed items
      produces:
      - application/json
      responses:
        "200":
          description: Unread count
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - Bearer: []
      summary: Get unread count
      tags:
      - Activity
  /api/v1/activity/follow/{userId}:
    delete:
      description: Unfollow a user by user ID
      parameters:
      - description: User ID to unfollow
        in: path
        name: userId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Unfollowed
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - Bearer: []
      summary: Unfollow user
      tags:
      - Activity
    post:
      description: Follow another user by user ID
      parameters:
      - description: User ID to follow
        in: path
        name: userId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Following
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - Bearer: []
      summary: Follow user
      tags:
      - Activity
  /api/v1/activity/followers:
    get:
      description: Get list of users following the current user
      produces:
      - application/json
      responses:
        "200":
          description: Followers list
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - Bearer: []
      summary: Get followers
      tags:
      - Activity
  /api/v1/activity/following:
    get:
      description: Get list of users the current user follows
      produces:
      - application/json
      responses:
        "200":
          description: Following list
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - Bearer: []
      summary: Get following
      tags:
      - Activity
  /api/v1/activity/leaderboard:
    get:
      description: Get the leaderboard of most active users
      parameters:
      - description: Number of top users (default 10)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Leaderboard
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - Bearer: []
      summary: Get leaderboard
      tags:
      - Activity
  /api/v1/activity/metrics:
    get:
      description: Get aggregated activity metrics for the current user
      produces:
      - application/json
      responses:
        "200":
          description: Activity metrics
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - Bearer: []
      summary: Get activity metrics
      tags:
      - Activity
  /api/v1/admin/agents:
    get:
      description: List all AI agents (admin only)
      produces:
      - application/json
      responses:
        "200":
          description: Agents list
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - Bearer: []
      summary: List agents
      tags:
      - Agent
    post:
      consumes:
      - application/json
      description: Create a new AI agent configuration (admin only)
      parameters:
      - description: Agent creation data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.CreateAgentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Agent created
          schema:
            $ref: '#/definitions/utils.CreatedResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - Bearer: []
      summary: Create agent
      tags:
      - Agent
  /api/v1/admin/agents/{id}:
    delete:
      description: Delete an AI agent by ID (admin only)
      parameters:
      - description: Agent ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No content
        "400":
          description: Invalid agent ID
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "404":
          description: Agent not found
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - Bearer: []
      summary: Delete agent
      tags:
      - Agent
    get:
      description: Get a specific AI agent by ID (admin only)
      parameters:
      - description: Agent ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Agent details
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
        "404":
          description: Agent not found
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - Bearer: []
      summary: Get agent
      tags:
      - Agent
    put:
      consumes:
      - application/json
      description: Update an existing AI agent configuration (admin only)
      parameters:
      - description: Agent ID
        in: path
        name: id
        required: true
        type: integer
      - description: Agent update data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.UpdateAgentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Agent updated
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "404":
          description: Agent not found
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - Bearer: []
      summary: Update agent
      tags:
      - Agent
  /api/v1/admin/agents/{id}/status:
    patch:
      consumes:
      - application/json
      description: Set the operational status of an AI agent (admin only)
      parameters:
      - description: Agent ID
        in: path
        name: id
        required: true
        type: integer
      - description: Status data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.SetAgentStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Status updated
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "404":
          description: Agent not found
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - Bearer: []
      summary: Set agent status
      tags:
      - Agent
  /api/v1/admin/agents/agents/{agentId}/capabilities:
    get:
      description: List all capabilities for a specific agent (admin only)
      parameters:
      - description: Agent ID
        in: path
        name: agentId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Capabilities list
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
        "400":
          description: Invalid agent ID
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - Bearer: []
      summary: List capabilities
      tags:
      - Agent
  /api/v1/admin/agents/capabilities:
    post:
      consumes:
      - application/json
      description: Add a new capability to an agent (admin only)
      parameters:
      - description: Capability data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.AddCapabilityRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Capability added
          schema:
            $ref: '#/definitions/utils.CreatedResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - Bearer: []
      summary: Add capability
      tags:
      - Agent
  /api/v1/admin/agents/capabilities/{id}:
    delete:
      description: Remove a capability by ID (admin only)
      parameters:
      - description: Capability ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No content
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - Bearer: []
      summary: Remove capability
      tags:
      - Agent
  /api/v1/admin/agents/capabilities/{id}/toggle:
    patch:
      consumes:
      - application/json
      description: Enable or disable an agent capability (admin only)
      parameters:
      - description: Capability ID
