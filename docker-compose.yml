version: "3.8"

services:
  backend_modules:
    container_name: backend_modules
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    restart: always
    env_file:
      - .env
    links:
      - db
    networks:
      - infrastructure
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: db
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_HOST: "%"
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: "Asia/Jakarta"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - infrastructure
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -u${DB_USERNAME} -p${DB_PASSWORD} || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  mysql_data:


networks:
  infrastructure:
    driver: bridge
