version: "3.8"

services:
  web:
    build:
      context: .
      target: runtime
    container_name: react-starter-prod
    ports:
      - "80:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
