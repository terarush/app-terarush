version: "3.8"

services:
  filebrowser:
    container_name: filebrowser
    image: filebrowser/filebrowser:latest
    restart: unless-stopped
    ports:
      - "9001:80"
    volumes:
      - /var/public:/srv
      - ./settings.json:/config/settings.json
    environment:
      - PID=1000
      - PGID=1000
    command: >
      sh -c "filebrowser users add root admin --perm.admin=true && filebrowser"
